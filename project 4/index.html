<!DOCTYPE html>
<html>
<head>
<title>Currency Converter APP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h3>Currency Converter APP</h3>

<!-- AMOUNT -->
<div class="row">
<label>Enter Amount IN FRW</label>
<input type="number" id="amount">
</div>

<!-- CURRENCY -->
<div class="row">
<label>Select Currency</label>
<select id="currency">
<option value="">--Select--</option>
<option value="USD">USD</option>
<option value="EURO">EURO</option>
</select>
</div>

<!-- RATE -->
<div class="row">
<label>Rate</label>
<input type="number" id="rate">
</div>

<!-- BUTTON -->
<button onclick="convert()">CONVERT</button>

<!-- RESULT -->
<div class="row">
<label>Result</label>
<div class="result" id="result">
Result Here ....
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
<style>body{
background:#ffffff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:380px;
background:#d3d3d3;
padding:20px;
text-align:center;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

h3{
margin-bottom:20px;
font-weight:bold;
}

.row{
text-align:left;
margin-bottom:15px;
}

label{
display:block;
font-size:13px;
margin-bottom:5px;
color:#333;
}

input, select{
width:100%;
padding:10px;
border:none;
border-radius:4px;
outline:none;
}

button{
width:100%;
padding:12px;
background:#1e90ff;
color:white;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0d74d1;
}

.result{
background:black;
color:white;
padding:12px;
min-height:35px;
border-radius:3px;
font-style:italic;
}</style>

<script>function convert()
{
let amount = document.getElementById("amount").value;
let rate = document.getElementById("rate").value;
let currency = document.getElementById("currency").value;

if(amount=="" || rate=="" || currency=="")
{
document.getElementById("result").innerHTML = "Fill all fields";
return;
}

let result = amount * rate;

document.getElementById("result").innerHTML =
"Result = " + result + " " + currency;
}</script>
